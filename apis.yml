aid: kiota
name: Kiota
description: >-
  Kiota is an open source API client generator from Microsoft that produces
  strongly-typed, lightweight clients from OpenAPI descriptions. It supports
  C#, Go, Java, PHP, Python, Ruby, Swift, and TypeScript, with a focus on
  minimal dependencies and idiomatic code patterns.
